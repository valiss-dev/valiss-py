name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the environment configured for the PyPI trusted publisher.
    environment: pypi
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup uv
      uses: astral-sh/setup-uv@v5

    - name: Check tag matches project version
      run: |
        version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
        if [ "v${version}" != "${GITHUB_REF_NAME}" ]; then
          echo "pyproject.toml version ${version} does not match tag ${GITHUB_REF_NAME}" >&2
          exit 1
        fi

    - name: Build
      run: uv build

    - name: Publish to PyPI
      run: uv publish
