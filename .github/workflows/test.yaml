name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        path: valiss-py

    # Sibling checkout of the Go reference (wire spec 1) so the cross-language
    # interop suite runs instead of skipping. Pinned to the tag valiss-py
    # targets; tests/interop/go.mod replaces the module to ../../../valiss-go.
    - uses: actions/checkout@v7
      with:
        repository: valiss-dev/valiss-go
        ref: v0.12.0
        path: valiss-go

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: valiss-py/tests/interop/go.mod
        cache-dependency-path: valiss-py/tests/interop/go.sum

    - name: Setup uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Install dependencies
      working-directory: valiss-py
      run: uv sync --all-extras

    - name: Type check
      working-directory: valiss-py
      run: uv run pyright src/valiss

    - name: Test
      working-directory: valiss-py
      run: uv run pytest -v

    - name: Run examples
      working-directory: valiss-py
      run: |
        uv run --group dev examples/issue_user.py
        uv run --group dev examples/verify_request.py
        uv run --group dev examples/verify_tooling.py
        uv run --group dev examples/http_server.py
        uv run --group dev examples/grpc_server.py
        uv run --group dev examples/webhook.py
        uv run --group dev examples/grpc_webhook.py
